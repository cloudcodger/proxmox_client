---
- name: Make sure that SSH Keys are set.
  ansible.builtin.assert:
    that: lxc_sshkeys is defined or proxmox_client_sshkeys is defined
    quiet: true

- name: Make sure that any required constuct values are set.
  ansible.builtin.assert:
    that:
      - lxc_construct_cidr_start is defined
      - lxc_construct_hosts | length > 0
    quiet: true
  when: lxc_construct_containers > 0

- name: Make sure that all provided ULA prefixes are valid.
  ansible.builtin.assert:
    that:
      - item | ansible.utils.ipaddr('host') != item
      - item | ansible.utils.ipaddr('network') != item
    quiet: true
    fail_msg: "Must be a valid IPv6 network CIDR with no host portion"
  loop:
    - "{{ (lxc_network_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (lxc_network1_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (lxc_network2_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (lxc_network3_ipv6_ula_prefix | default(omit)) }}"

- name: Construct containers list.
  ansible.builtin.set_fact:
    lxc_new_cts:
      name: "{{ lxc_construct_container_prefix }}{{
        '%0*d' | format(lxc_construct_padding_width, item + 1) }}"
      ip: "{{ lxc_construct_cidr_start | ansible.utils.ipmath(item)
        }}/{{ lxc_construct_cidr_start | split('/') | last }}"
      ip6: "{{ '%s/%s' | format(lxc_construct_cidr6_start | default('::/0') |
        ansible.utils.ipmath(item), lxc_construct_cidr6_start | split('/') |
        last) if lxc_construct_cidr6_start is defined else omit }}"
      net1_ip: "{{ '%s/%s' | format(lxc_construct_cidr_net1_start | default('') |
        ansible.utils.ipmath(item),
        lxc_construct_cidr_net1_start | split('/') | last)
        if lxc_construct_cidr_net1_start is defined else omit }}"
      net1_ip6: "{{ '%s/%s' | format(lxc_construct_cidr6_net1_start |
        lxc_construct_cidr6_net1_start / split('/') | last)
        if lxc_construct_cidr6_net1_start is defined else omit }}"
      net2_ip: "{{ '%s/%s' | format(lxc_construct_cidr_net2_start |
        default('') | ansible.utils.ipmath(item),
        lxc_construct_cidr_net2_start | split('/') | last)
        if lxc_construct_cidr_net2_start is defined else omit }}"
      net2_ip6: "{{ '%s/%s' | format(lxc_construct_cidr6_net2_start |
        lxc_construct_cidr6_net2_start / split('/') | last)
        if lxc_construct_cidr6_net2_start is defined else omit }}"
      net3_ip: "{{ '%s/%s' | format(lxc_construct_cidr_net3_start |
        default('') | ansible.utils.ipmath(item),
        lxc_construct_cidr_net3_start | split('/') | last)
        if lxc_construct_cidr_net3_start is defined else omit }}"
      net3_ip6: "{{ '%s/%s' | format(lxc_construct_cidr6_net3_start |
        lxc_construct_cidr6_net3_start / split('/') | last)
        if lxc_construct_cidr6_net3_start is defined else omit }}"
      pm_host: "{{ lxc_construct_hosts[item % lxc_construct_hosts | length] if
        lxc_find_pm_host is false else omit }}"
      tags: "{{ lxc_construct_ct0_tags if lxc_construct_ct0_tags and item < 1 else
        omit }}"
      vmid: "{{ '%03d' | format(lxc_construct_vmid_start + item)
        if lxc_construct_vmid_start is defined else omit }}"
  register: lxc_generated
  loop: "{{ range(0, lxc_construct_containers) | list }}"

- name: Combine constructed containers and containers.
  ansible.builtin.set_fact:
    lxc_combined_lxcs: "{{ lxc_cts + lxc_generated.results |
      map(attribute='ansible_facts.lxc_new_cts') }}"

- name: Include the creation tasks.
  ansible.builtin.include_tasks: creator.yml
  loop: "{{ lxc_combined_lxcs }}"
  loop_control:
    loop_var: creator_item
  vars:
    creator_item_random_number: "{{ (inventory_hostname +
      (proxmox_client_sshkeys | default(lxc_sshkeys))) |
      hash('md5') | int(base=16) % 2**48 }}"

- name: Flush handlers.
  ansible.builtin.meta: flush_handlers

- name: Scan for ssh-hostkeys
  ansible.builtin.command:
    cmd: "/usr/bin/ssh-keyscan {{ hostvars[item]['ansible_host'] }}"
  changed_when: false
  ignore_errors: true
  register: lxc_keyscan_cmd
  loop: "{{ lxc_combined_lxcs | map(attribute='name') }}"
  loop_control:
    label: "{{ item }}: {{ hostvars[item]['ansible_host'] | default('none') }}"
  until: not lxc_keyscan_cmd.failed
  when: lxc_update_known_hosts is true

- name: Add hostkeys to known_hosts
  ansible.builtin.lineinfile:
    path: ~/.ssh/known_hosts
    regexp: "^{{ item.split()[:2] | join(' ') }}"
    line: "{{ item }}"
  loop: "{{ lxc_keyscan_cmd.results | map(attribute='stdout_lines') | flatten }}"
  loop_control:
    label: "{{ item.split()[:2] | join(' ') }}"
  when:
    - lxc_update_known_hosts is true
    - item[:1] != '#'

- name: Wait for the new systems to be accessible.
  ansible.builtin.wait_for_connection:
  delegate_to: "{{ item.name }}"
  loop: "{{ lxc_combined_lxcs }}"
  loop_control:
    label: "{{ item.name }}"
  when: lxc_wait_for_connection is true
