---
- name: Make sure that any required constuct values are set.
  ansible.builtin.assert:
    that:
      - cloud_init_construct_cidr_start is defined
      - cloud_init_construct_hosts | length > 0 or cloud_init_find_pm_host is true
    quiet: true
  when: cloud_init_construct_controllers + cloud_init_construct_workers > 0

- name: Make sure that all provided ULA prefixes are valid.
  ansible.builtin.assert:
    that:
      - item | ansible.utils.ipaddr('host') != item
      - item | ansible.utils.ipaddr('network') != item
    quiet: true
    fail_msg: "Must be a valid IPv6 network CIDR with no host portion"
  loop:
    - "{{ (cloud_init_network_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (cloud_init_network1_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (cloud_init_network2_ipv6_ula_prefix | default(omit)) }}"
    - "{{ (cloud_init_network3_ipv6_ula_prefix | default(omit)) }}"

- name: Construct cloud_init_vms list.
  ansible.builtin.set_fact:
    cloud_init_new_vms:
      name: "{{ cloud_init_ctrl_prefix if
        generated_vm_is_controller else
        cloud_init_work_prefix }}{{
        '%0*d' | format(cloud_init_construct_padding_width, item + 1 if
          generated_vm_is_controller else
          item + 1 - cloud_init_construct_controllers) }}"
      control: "{{ generated_vm_is_controller }}"
      genesis: "{{ omit if item > 0 else true }}"
      ip: "{{ cloud_init_construct_cidr_start | ansible.utils.ipmath(item)
        }}/{{ cloud_init_construct_cidr_start | split('/') | last }}"
      ip6: "{{ '%s/%s' | format(cloud_init_construct_cidr6_start |
        default('::/0') | ansible.utils.ipmath(item),
        cloud_init_construct_cidr6_start | split('/') | last)
        if cloud_init_construct_cidr6_start is defined else omit }}"
      net1_ip: "{{ '%s/%s' | format(cloud_init_construct_cidr_net1_start |
        default('') | ansible.utils.ipmath(item),
        cloud_init_construct_cidr_net1_start | split('/') | last)
        if cloud_init_construct_cidr_net1_start is defined else omit }}"
      net1_ip6: "{{ '%s/%s' | format(cloud_init_construct_cidr6_net1_start |
        cloud_init_construct_cidr6_net1_start / split('/') | last)
        if cloud_init_construct_cidr6_net1_start is defined else omit }}"
      net2_ip: "{{ '%s/%s' | format(cloud_init_construct_cidr_net2_start |
        default('') | ansible.utils.ipmath(item),
        cloud_init_construct_cidr_net2_start | split('/') | last)
        if cloud_init_construct_cidr_net2_start is defined else omit }}"
      net2_ip6: "{{ '%s/%s' | format(cloud_init_construct_cidr6_net2_start |
        cloud_init_construct_cidr6_net2_start / split('/') | last)
        if cloud_init_construct_cidr6_net2_start is defined else omit }}"
      net3_ip: "{{ '%s/%s' | format(cloud_init_construct_cidr_net3_start |
        default('') | ansible.utils.ipmath(item),
        cloud_init_construct_cidr_net3_start | split('/') | last)
        if cloud_init_construct_cidr_net3_start is defined else omit }}"
      net3_ip6: "{{ '%s/%s' | format(cloud_init_construct_cidr6_net3_start |
        cloud_init_construct_cidr6_net3_start / split('/') | last)
        if cloud_init_construct_cidr6_net3_start is defined else omit }}"
      pm_host: "{{ cloud_init_construct_hosts[item % cloud_init_construct_hosts | length] if
        cloud_init_find_pm_host is false else omit }}"
      tags: "{{ cloud_init_genesis_tags if item == 0 else
        cloud_init_ctrl_tags if generated_vm_is_controller else
        cloud_init_work_tags }}"
      vmid: "{{ '%03d' | format(cloud_init_construct_vmid_start + item)
        if cloud_init_construct_vmid_start is defined else omit }}"
  register: cloud_init_generated_vms
  loop: "{{ range(0, cloud_init_construct_controllers + cloud_init_construct_workers) | list }}"
  vars:
    generated_vm_is_controller: "{{ item < cloud_init_construct_controllers }}"

- name: Combine constructed virtual machines and cloud_init_vms.
  ansible.builtin.set_fact:
    cloud_init_combined_vms: "{{ cloud_init_vms + cloud_init_generated_vms.results |
      map(attribute='ansible_facts.cloud_init_new_vms') }}"

- name: Include the creation tasks.
  ansible.builtin.include_tasks: creator.yml
  loop: "{{ cloud_init_combined_vms }}"
  loop_control:
    loop_var: creator_item
  vars:
    creator_item_random_number: "{{ (inventory_hostname +
      (proxmox_client_sshkeys | default(cloud_init_sshkeys))) |
      hash('md5') | int(base=16) % 2**48 }}"
    generated_vm_is_controller: "{{ creator_item.control | default(false) }}"

- name: Flush handlers.
  ansible.builtin.meta: flush_handlers

- name: Scan for ssh-hostkeys
  ansible.builtin.command:
    cmd: "/usr/bin/ssh-keyscan {{ hostvars[item]['ansible_host'] }}"
  changed_when: false
  ignore_errors: true
  register: cloud_init_keyscan_cmd
  loop: "{{ cloud_init_combined_vms | map(attribute='name') }}"
  loop_control:
    label: "{{ item }}: {{ hostvars[item]['ansible_host'] | default('none') }}"
  until: not cloud_init_keyscan_cmd.failed
  when: cloud_init_update_known_hosts is true

- name: Add hostkeys to known_hosts
  ansible.builtin.lineinfile:
    path: ~/.ssh/known_hosts
    regexp: "^{{ item.split()[:2] | join(' ') }}"
    line: "{{ item }}"
  loop: "{{ cloud_init_keyscan_cmd.results | map(attribute='stdout_lines') | flatten }}"
  loop_control:
    label: "{{ item.split()[:2] | join(' ') }}"
  when:
    - cloud_init_keyscan_cmd is changed
    - cloud_init_update_known_hosts is true
    - item[:1] != '#'

- name: Wait for the new systems to be accessible.
  ansible.builtin.wait_for_connection:
  delegate_to: "{{ item.name }}"
  loop: "{{ cloud_init_combined_vms }}"
  loop_control:
    label: "{{ item.name }}"
  when: cloud_init_wait_for_connection is true
